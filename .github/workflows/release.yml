name: release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (preview only, no publish)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: semantic-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
          always-auth: true

      - name: install
        run: npm ci

      - name: verify
        run: npm run verify

      - name: build
        run: npm run build

      - name: configure gpg commit signing
        if: ${{ inputs.dry_run != true }}
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: false
          git_push_gpgsign: false
          git_config_global: false
          git_committer_name: ${{ secrets.GIT_COMMIT_USER_NAME }}
          git_committer_email: ${{ secrets.GIT_COMMIT_USER_EMAIL }}

      - name: semantic-release (dry run)
        if: ${{ inputs.dry_run == true }}
        run: npx semantic-release --dry-run
        env:
          GIT_AUTHOR_NAME: ${{ secrets.GIT_COMMIT_USER_NAME }}
          GIT_AUTHOR_EMAIL: ${{ secrets.GIT_COMMIT_USER_EMAIL }}
          GIT_COMMITTER_NAME: ${{ secrets.GIT_COMMIT_USER_NAME }}
          GIT_COMMITTER_EMAIL: ${{ secrets.GIT_COMMIT_USER_EMAIL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: semantic-release
        if: ${{ inputs.dry_run != true }}
        run: npx semantic-release
        env:
          GIT_AUTHOR_NAME: ${{ secrets.GIT_COMMIT_USER_NAME }}
          GIT_AUTHOR_EMAIL: ${{ secrets.GIT_COMMIT_USER_EMAIL }}
          GIT_COMMITTER_NAME: ${{ secrets.GIT_COMMIT_USER_NAME }}
          GIT_COMMITTER_EMAIL: ${{ secrets.GIT_COMMIT_USER_EMAIL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
